name: CI

on:
  push:
    branches: [main, "release-candidate/**"]
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run release:check
